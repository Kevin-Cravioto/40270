<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
    <style>
        /* Animación para el círculo en movimiento */
        .circulo-movimiento {
            animation: moverCirculo 6s linear infinite;
        }

        @keyframes moverCirculo {
            0%   { cx: 80px;  cy: 80px; }
            25%  { cx: 320px; cy: 80px; }
            50%  { cx: 320px; cy: 320px; }
            75%  { cx: 80px;  cy: 320px; }
            100% { cx: 80px;  cy: 80px; }
        }
    </style>
</head>
<body>
    <h1>Ejemplo de SVG</h1>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow"></circle>
    </svg>

    <h2>Segundo ejemplo gg</h2>
    <svg width="400" height="400" viewBox="0 0 400 400">
        <circle cx="290" cy="80" r="40" fill="gray" stroke="black" stroke-width="5" />
        <circle cx="130" cy="80" r="40" fill="gray" stroke="black" stroke-width="5" />
        <circle cx="210" cy="150" r="110" fill="red" stroke="black" stroke-width="5" />
        <circle cx="290" cy="200" r="40" fill="gray" stroke="black" stroke-width="5" />
        <circle cx="130" cy="200" r="40" fill="gray" stroke="black" stroke-width="5" />
        <circle cx="210" cy="150" r="100" fill="orange" stroke="black" stroke-width="5" />
        <circle cx="170" cy="120" r="15" fill="red" stroke="white" stroke-width="10" />
        <circle cx="250" cy="120" r="15" fill="red" stroke="white" stroke-width="10" />
    </svg>

    <h2>Tercer ejemplo - Círculo en movimiento</h2>
    
    <svg width="400" height="400" viewBox="0 0 400 400">
        <!-- Fondo opcional -->
        <rect width="400" height="400" fill="#f0f0f0" rx="20"/>

        <!-- Círculo animado -->
        <circle 
            class="circulo-movimiento"
            cx="80" 
            cy="80" 
            r="45" 
            fill="#00ffcc" 
            stroke="#0088aa" 
            stroke-width="12"/>
    </svg>

</body>
</html>
